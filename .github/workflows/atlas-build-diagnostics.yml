name: Atlas Build Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture production build
        id: build
        continue-on-error: true
        run: npm run build > atlas-build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-build-log
          path: atlas-build.log
          retention-days: 2
      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
