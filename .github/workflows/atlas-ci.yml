name: Atlas CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: atlas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download source quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir source
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1 -C source

      - name: Audit service-role Atlas API routes
        run: cd source && node scripts/audit-atlas-api-boundaries.mjs

      - name: List direct task-transition RPC routes
        shell: bash
        run: |
          cd source
          offenders="$(grep -RIlE 'worker_record_task_transition_v1|owner_record_task_transition_v1|record_task_transition_v1' app/api/atlas || true)"
          offenders="$(printf '%s\n' "$offenders" | grep -v '^app/api/atlas/task-transition/route.ts$' || true)"
          if [ -n "$offenders" ]; then
            echo "Atlas API routes bypassing the shared task transition route:"
            echo "$offenders"
            exit 1
          fi

      - name: Reject legacy worker transition clients
        shell: bash
        run: |
          cd source
          offenders="$(grep -RIl '/api/atlas/work/tasks/' app components lib || true)"
          if [ -n "$offenders" ]; then
            echo "Legacy worker transition endpoint references:"
            echo "$offenders"
            exit 1
          fi

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard service-role API routes
        run: node --test --test-name-pattern="interactive Atlas API routes" tests/atlas-architecture-traps.test.mjs

      - name: Guard canonical task mutations
        run: node --test --test-name-pattern="all task mutations" tests/atlas-architecture-traps.test.mjs

      - name: Guard homepage membership scope
        run: node --test --test-name-pattern="homepage reader" tests/atlas-architecture-traps.test.mjs

      - name: Run tests
        run: npm test

      - name: Build Atlas
        shell: bash
        run: |
          set +e
          npm run build > atlas-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 120 atlas-build.log
            exit "$status"
          fi
          tail -n 40 atlas-build.log
        env:
          SUPABASE_URL: https://atlas-ci.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: atlas-ci-service-role-placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://atlas-ci.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: atlas-ci-publishable-placeholder
