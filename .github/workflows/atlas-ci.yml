name: Atlas CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: atlas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Atlas
        shell: bash
        run: |
          set +e
          npm run build > atlas-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 120 atlas-build.log
            exit "$status"
          fi
          tail -n 40 atlas-build.log
        env:
          SUPABASE_URL: https://atlas-ci.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: atlas-ci-service-role-placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://atlas-ci.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: atlas-ci-publishable-placeholder

      - name: Upload failed build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-build-log
          path: atlas-build.log
          if-no-files-found: error
          retention-days: 1
